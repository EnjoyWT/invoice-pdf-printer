name: Deploy Web
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
# 必须添加权限，否则最后一步上传 Release 会报 403 错误
permissions:
  contents: write
jobs:
  # ===============================
  # ① 部署 Web（Vercel）
  # ===============================
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Setup Node.js (for Vercel)
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable pnpm (corepack)
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          pnpm --version
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
        working-directory: ./invoice-server
      # 必须指定 Org ID 和 Project ID，否则 CI 无法知道部署到哪里
      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./invoice-server
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Fix pnpm lock tarball URLs
        working-directory: ./invoice-server
        run: |
          # pnpm-lock.yaml 里部分依赖 tarball 被解析到内网镜像 `http://120.79.94.153:4873/`，
          # 在 Vercel/Actions 环境下会出现大量 ERR_SOCKET_TIMEOUT。
          # 这里在 CI 中临时重写为官方 npm registry，避免构建卡死。
          sed -i 's#http://120.79.94.153:4873/#https://registry.npmjs.org/#g' pnpm-lock.yaml
      - name: Build Web (CI)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./invoice-server
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Deploy to Vercel Production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./invoice-server
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
